name: Unit tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  vitest:
    name: vitest
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci
        env:
          # The husky `prepare` script normally runs on `npm install` to wire
          # up the local git hook. CI doesn't need (or want) the local hook,
          # and husky is not available before deps are installed, so skip it.
          # See CAPACITOR_NOTES.md → "Husky version policy".
          HUSKY: "0"

      # Run the Husky policy guard FIRST so it fails fast (it's a few ms)
      # and surfaces as its own clearly-named step badge in the Actions UI.
      # The same test also runs as part of the full suite below; the tiny
      # duplication is intentional — it gives policy drift its own visible
      # signal at the top of the job. Tasks #429 / #430.
      - name: Husky policy guard (package.json scripts.prepare)
        run: npx vitest run tests/packageJsonScripts.test.ts --reporter=verbose

      - name: Run vitest suite
        run: npx vitest run --reporter=verbose
